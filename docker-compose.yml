version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: interview-assistant-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: interview-assistant-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/interview-assistant
      - JWT_SECRET=supersecret123
      - NODE_ENV=production
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: interview-assistant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
